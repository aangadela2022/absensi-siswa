<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Absensi Sync - SMKN 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [role, setRole] = useState(localStorage.getItem('user_role') || 'operator');
            const [activeTab, setActiveTab] = useState('scan');
            const [students, setStudents] = useState(JSON.parse(localStorage.getItem('db_students')) || []);
            const [attendanceLogs, setAttendanceLogs] = useState(JSON.parse(localStorage.getItem('db_logs')) || []);
            const [scriptUrl, setScriptUrl] = useState(localStorage.getItem('abs_url') || "");
            const [feedback, setFeedback] = useState({ msg: '', type: '', show: false });
            const [isManualModalOpen, setIsManualModalOpen] = useState(false);
            const [isAdminLoginModalOpen, setIsAdminLoginModalOpen] = useState(false);
            const [currentTime, setCurrentTime] = useState(new Date().toLocaleTimeString('id-ID'));

            const qrScannerRef = useRef(null);
            const scannerContainerId = "reader";

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date().toLocaleTimeString('id-ID')), 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                localStorage.setItem('db_students', JSON.stringify(students));
            }, [students]);

            useEffect(() => {
                localStorage.setItem('db_logs', JSON.stringify(attendanceLogs));
            }, [attendanceLogs]);

            useEffect(() => {
                localStorage.setItem('abs_url', scriptUrl);
            }, [scriptUrl]);

            useEffect(() => {
                if (activeTab === 'scan') {
                    startScanner();
                } else {
                    stopScanner();
                }
                return () => stopScanner();
            }, [activeTab]);

            const startScanner = async () => {
                setTimeout(async () => {
                    const element = document.getElementById(scannerContainerId);
                    if (element && !qrScannerRef.current) {
                        const html5QrCode = new Html5Qrcode(scannerContainerId);
                        qrScannerRef.current = html5QrCode;
                        try {
                            await html5QrCode.start(
                                { facingMode: "environment" },
                                { fps: 10, qrbox: 250 },
                                (decodedText) => handleScanSuccess(decodedText)
                            );
                        } catch (err) {
                            console.error("Scanner error:", err);
                        }
                    }
                }, 500);
            };

            const stopScanner = async () => {
                if (qrScannerRef.current) {
                    try {
                        await qrScannerRef.current.stop();
                        qrScannerRef.current = null;
                    } catch (e) {}
                }
            };

            const handleScanSuccess = (decodedText) => {
                const student = students.find(s => s.studentId === decodedText.trim());
                if (!student) {
                    showNotify(`ID ${decodedText} tidak terdaftar`, 'error');
                    return;
                }

                const today = new Date().toLocaleDateString('id-ID');
                const isAlreadyPresent = attendanceLogs.some(l => l.studentId === student.studentId && l.tgl === today);

                if (isAlreadyPresent) {
                    showNotify(`${student.nama} sudah absen hari ini`, 'warning');
                    return;
                }

                const newLog = {
                    studentId: student.studentId,
                    nama: student.nama,
                    kelas: student.kelas,
                    jam: new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }),
                    tgl: today,
                    timestamp: new Date().getTime()
                };

                setAttendanceLogs(prev => [newLog, ...prev]);
                showNotify(`✅ ${student.nama} berhasil hadir`, 'success');
                
                // Sinkronisasi ke Google Sheets
                if (scriptUrl) {
                    // Format data sesuai script.gs: [Tgl, ID, Nama, Kelas, Jam]
                    const payload = [
                        newLog.tgl,
                        newLog.studentId,
                        newLog.nama,
                        newLog.kelas,
                        newLog.jam
                    ];

                    fetch(scriptUrl, { 
                        method: 'POST', 
                        mode: 'no-cors', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload) 
                    }).then(() => console.log("Synced to Cloud"))
                      .catch(err => console.error("Sync Error:", err));
                }
            };

            const showNotify = (msg, type) => {
                setFeedback({ msg, type, show: true });
                setTimeout(() => setFeedback(prev => ({ ...prev, show: false })), 3000);
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                // Password default: admin123
                if (e.target.password.value === 'admin123') {
                    setRole('admin');
                    localStorage.setItem('user_role', 'admin');
                    setIsAdminLoginModalOpen(false);
                } else {
                    showNotify("Password salah!", "error");
                }
            };

            const getClassStats = () => {
                const today = new Date().toLocaleDateString('id-ID');
                const stats = {};
                
                students.forEach(s => {
                    if (!stats[s.kelas]) stats[s.kelas] = { total: 0, present: 0 };
                    stats[s.kelas].total++;
                });

                attendanceLogs.filter(l => l.tgl === today).forEach(l => {
                    if (stats[l.kelas]) stats[l.kelas].present++;
                });

                return Object.entries(stats).map(([name, data]) => ({
                    name,
                    ...data,
                    percent: data.total > 0 ? Math.round((data.present / data.total) * 100) : 0
                })).sort((a, b) => a.name.localeCompare(b.name));
            };

            const todayCount = attendanceLogs.filter(l => l.tgl === new Date().toLocaleDateString('id-ID')).length;
            const totalSiswa = students.length;
            const classStats = getClassStats();

            return (
                <div className="min-h-screen pb-10">
                    {/* Navigation */}
                    <nav className="p-4 sticky top-0 z-50">
                        <div className="max-w-5xl mx-auto glass rounded-[2rem] px-6 py-3 flex justify-between items-center shadow-xl shadow-slate-200/50">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><rect width="5" height="5" x="3" y="3" rx="1"/><rect width="5" height="5" x="16" y="3" rx="1"/><rect width="5" height="5" x="3" y="16" rx="1"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M21 21v.01"/><path d="M12 7v3a2 2 0 0 1-2 2H7"/><path d="M3 12h.01"/><path d="M12 3h.01"/><path d="M12 16v.01"/><path d="M16 12h1"/><path d="M21 12v.01"/><path d="M12 21v.01"/></svg>
                                </div>
                                <div>
                                    <h1 className="text-sm font-extrabold uppercase tracking-tight">e-Absensi <span className="text-indigo-600">Sync</span></h1>
                                    <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">{role}</p>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-2 bg-slate-100 p-1.5 rounded-2xl">
                                <button onClick={() => setActiveTab('scan')} className={`px-4 py-2 rounded-xl text-xs font-bold transition-all ${activeTab === 'scan' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-indigo-400'}`}>Scan</button>
                                {role === 'admin' && (
                                    <button onClick={() => setActiveTab('admin')} className={`px-4 py-2 rounded-xl text-xs font-bold transition-all ${activeTab === 'admin' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'}`}>Pengaturan</button>
                                )}
                                <div className="w-px h-4 bg-slate-300 mx-1"></div>
                                {role === 'operator' ? (
                                    <button onClick={() => setIsAdminLoginModalOpen(true)} className="p-2 text-slate-400 hover:text-indigo-600 transition-colors"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></button>
                                ) : (
                                    <button onClick={() => {setRole('operator'); localStorage.setItem('user_role', 'operator'); setActiveTab('scan')}} className="p-2 text-red-400 hover:text-red-600 transition-colors"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg></button>
                                )}
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-5xl mx-auto px-4 mt-4 space-y-6">
                        {/* Summary Cards */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-white">
                                <p className="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-1">Hadir Hari Ini</p>
                                <h3 className="text-4xl font-extrabold text-slate-800">{todayCount} <span className="text-sm font-bold text-indigo-400">/ {totalSiswa}</span></h3>
                            </div>
                            <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-white">
                                <p className="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-1">Persentase Total</p>
                                <h3 className="text-4xl font-extrabold text-indigo-600">{totalSiswa > 0 ? Math.round((todayCount/totalSiswa)*100) : 0}%</h3>
                            </div>
                            <div className="bg-indigo-600 p-6 rounded-[2.5rem] shadow-lg text-white flex justify-between items-center relative overflow-hidden">
                                <div className="z-10">
                                    <p className="text-[10px] font-extrabold opacity-60 uppercase tracking-widest mb-1">Server Time</p>
                                    <h3 className="text-2xl font-extrabold">{currentTime}</h3>
                                </div>
                                <div className="z-10 bg-white/20 p-2 rounded-xl border border-white/20">
                                    <div className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
                                </div>
                                <div className="absolute -right-4 -bottom-4 opacity-10 rotate-12 scale-150">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="5" height="5" x="3" y="3" rx="1"/><rect width="5" height="5" x="16" y="3" rx="1"/><rect width="5" height="5" x="3" y="16" rx="1"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/></svg>
                                </div>
                            </div>
                        </div>

                        {activeTab === 'scan' && (
                            <div className="space-y-6">
                                <div className="grid lg:grid-cols-5 gap-6">
                                    <div className="lg:col-span-3">
                                        <div className="bg-slate-900 rounded-[3rem] p-3 aspect-video relative overflow-hidden border-4 border-white shadow-2xl">
                                            <div id={scannerContainerId} className="w-full h-full rounded-[2.5rem] overflow-hidden bg-black"></div>
                                            <button onClick={() => setIsManualModalOpen(true)} className="absolute bottom-6 right-6 bg-white text-indigo-600 px-6 py-3 rounded-2xl font-extrabold text-[10px] uppercase tracking-widest shadow-xl flex items-center gap-2">
                                                Manual Input
                                            </button>
                                        </div>
                                        {feedback.show && (
                                            <div className={`mt-4 p-4 rounded-2xl text-center font-bold text-sm border animate-bounce ${feedback.type === 'success' ? 'bg-emerald-50 border-emerald-200 text-emerald-700' : 'bg-red-50 border-red-200 text-red-700'}`}>
                                                {feedback.msg}
                                            </div>
                                        )}
                                    </div>

                                    <div className="lg:col-span-2">
                                        <div className="bg-white rounded-[3rem] p-6 h-full border border-white shadow-sm flex flex-col min-h-[300px]">
                                            <h3 className="font-extrabold text-slate-800 text-xs uppercase tracking-tight mb-4 flex items-center gap-2">
                                                <svg className="text-indigo-600" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M12 20v-6M6 20V10M18 20V4"/></svg> Log Real-time
                                            </h3>
                                            <div className="flex-1 overflow-y-auto space-y-2 pr-2 scrollbar-hide">
                                                {attendanceLogs.length === 0 ? (
                                                    <div className="h-full flex items-center justify-center opacity-20 text-[10px] font-bold uppercase tracking-widest text-center">Belum ada absen<br/>hari ini</div>
                                                ) : (
                                                    attendanceLogs.slice(0,10).map((log, i) => (
                                                        <div key={i} className="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex justify-between items-center animate-in slide-in-from-right duration-300">
                                                            <div>
                                                                <h4 className="font-extrabold text-xs text-slate-800">{log.nama}</h4>
                                                                <p className="text-[9px] font-bold text-slate-400 uppercase">{log.kelas}</p>
                                                            </div>
                                                            <span className="bg-white px-2 py-1 rounded-lg border border-slate-100 text-[10px] font-extrabold text-indigo-600">{log.jam}</span>
                                                        </div>
                                                    ))
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Persentase per Kelas */}
                                <div className="bg-white p-8 rounded-[3rem] border border-white shadow-sm">
                                    <div className="flex items-center gap-3 mb-6">
                                        <div className="p-2 bg-indigo-50 rounded-xl text-indigo-600"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
                                        <h3 className="text-sm font-extrabold uppercase tracking-tight">Sebaran Kehadiran per Kelas</h3>
                                    </div>
                                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4">
                                        {classStats.length === 0 ? (
                                            <div className="col-span-full py-10 text-center text-slate-300 text-[10px] font-bold uppercase tracking-widest">Database Siswa Kosong</div>
                                        ) : classStats.map(stat => (
                                            <div key={stat.name} className="bg-slate-50 p-4 rounded-3xl border border-slate-100 flex flex-col items-center">
                                                <div className="w-full flex justify-between items-center mb-1">
                                                    <span className="text-[9px] font-extrabold text-slate-400 uppercase">{stat.name}</span>
                                                    <span className="text-[9px] font-extrabold text-indigo-600">{stat.percent}%</span>
                                                </div>
                                                <div className="text-xl font-extrabold text-slate-800">
                                                    {stat.present}<span className="text-[10px] text-slate-300 mx-1">/</span>{stat.total}
                                                </div>
                                                <div className="w-full h-1.5 bg-slate-200 rounded-full mt-3 overflow-hidden">
                                                    <div className="h-full bg-indigo-500 rounded-full transition-all duration-1000" style={{width: `${stat.percent}%`}}></div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {role === 'admin' && activeTab === 'admin' && (
                            <div className="space-y-6 animate-in fade-in duration-500">
                                {/* Google Sheets Integration */}
                                <div className="bg-white p-8 rounded-[3rem] border border-white shadow-sm">
                                    <h3 className="text-sm font-extrabold text-slate-800 uppercase tracking-tight mb-4 flex items-center gap-2">
                                        <svg className="text-emerald-500" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M12 2v20M2 12h20"/></svg>
                                        Koneksi Google Sheets
                                    </h3>
                                    <div className="flex flex-col md:flex-row gap-3">
                                        <input 
                                            value={scriptUrl} 
                                            onChange={(e) => setScriptUrl(e.target.value)}
                                            placeholder="Tempel URL Web App Apps Script di sini..." 
                                            className="flex-1 p-4 bg-slate-50 rounded-2xl text-xs font-bold outline-none border border-transparent focus:border-indigo-200 transition-all" 
                                        />
                                        <button onClick={() => showNotify("URL Tersimpan", "success")} className="bg-indigo-600 text-white px-8 rounded-2xl font-extrabold text-[10px] uppercase shadow-lg shadow-indigo-100">Simpan URL</button>
                                    </div>
                                    <p className="mt-3 text-[10px] text-slate-400 font-medium italic">Data absensi akan otomatis terkirim ke Spreadsheet setiap kali scan berhasil.</p>
                                </div>

                                {/* Database Siswa */}
                                <div className="bg-white p-8 rounded-[3rem] border border-white shadow-sm">
                                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                                        <div>
                                            <h3 className="text-lg font-extrabold text-slate-800 uppercase tracking-tight">Database Siswa</h3>
                                            <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Format CSV: ID,Nama,Kelas</p>
                                        </div>
                                        <div className="flex gap-2">
                                            <input type="file" id="csvInput" className="hidden" accept=".csv" onChange={(e) => {
                                                const file = e.target.files[0];
                                                const reader = new FileReader();
                                                reader.onload = (event) => {
                                                    const rows = event.target.result.split('\n').filter(r => r.trim());
                                                    const newData = rows.map(r => {
                                                        const [id, nama, kelas] = r.split(',');
                                                        return { studentId: id?.trim(), nama: nama?.trim(), kelas: kelas?.trim() };
                                                    }).filter(s => s.studentId && s.nama);
                                                    setStudents(newData);
                                                    showNotify(`Berhasil impor ${newData.length} siswa`, 'success');
                                                };
                                                reader.readAsText(file);
                                            }} />
                                            <button onClick={() => document.getElementById('csvInput').click()} className="px-5 py-3 bg-emerald-500 text-white rounded-2xl text-[10px] font-extrabold uppercase tracking-widest hover:bg-emerald-600 transition-colors">Impor CSV</button>
                                            <button onClick={() => { if(confirm("Hapus semua data siswa?")) setStudents([]) }} className="px-5 py-3 bg-red-50 text-red-500 rounded-2xl text-[10px] font-extrabold uppercase tracking-widest hover:bg-red-100 transition-colors">Reset</button>
                                        </div>
                                    </div>

                                    {/* Manual Student Add */}
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-3 mb-8">
                                        <input id="newId" placeholder="ID Siswa" className="p-4 bg-slate-50 rounded-2xl text-xs font-bold outline-none border border-transparent focus:border-indigo-100" />
                                        <input id="newNama" placeholder="Nama Lengkap" className="p-4 bg-slate-50 rounded-2xl text-xs font-bold outline-none border border-transparent focus:border-indigo-100" />
                                        <input id="newKelas" placeholder="Kelas" className="p-4 bg-slate-50 rounded-2xl text-xs font-bold outline-none border border-transparent focus:border-indigo-100" />
                                        <button onClick={() => {
                                            const id = document.getElementById('newId').value;
                                            const nm = document.getElementById('newNama').value;
                                            const kl = document.getElementById('newKelas').value;
                                            if(id && nm && kl) {
                                                setStudents([...students, {studentId: id, nama: nm, kelas: kl}]);
                                                document.getElementById('newId').value = '';
                                                document.getElementById('newNama').value = '';
                                                document.getElementById('newKelas').value = '';
                                                showNotify("Siswa ditambahkan", "success");
                                            } else {
                                                showNotify("Lengkapi semua field", "error");
                                            }
                                        }} className="bg-slate-900 text-white rounded-2xl font-extrabold text-[10px] uppercase hover:bg-slate-800 transition-colors">Tambah Siswa</button>
                                    </div>

                                    <div className="max-h-96 overflow-y-auto rounded-3xl border border-slate-100 scrollbar-hide">
                                        <table className="w-full text-left text-[11px]">
                                            <thead className="sticky top-0 bg-white shadow-sm">
                                                <tr>
                                                    <th className="p-5 font-extrabold text-slate-400 uppercase tracking-widest border-b border-slate-50">ID Barcode</th>
                                                    <th className="p-5 font-extrabold text-slate-400 uppercase tracking-widest border-b border-slate-50">Nama Siswa</th>
                                                    <th className="p-5 font-extrabold text-slate-400 uppercase tracking-widest border-b border-slate-50">Kelas</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {students.length === 0 ? (
                                                    <tr>
                                                        <td colSpan="3" className="p-10 text-center text-slate-300 font-bold uppercase tracking-widest">Tidak ada data siswa</td>
                                                    </tr>
                                                ) : students.map((s, i) => (
                                                    <tr key={i} className="hover:bg-slate-50/50 transition-colors">
                                                        <td className="p-5 font-bold text-indigo-600 tracking-wider">{s.studentId}</td>
                                                        <td className="p-5 font-extrabold text-slate-700 uppercase">{s.nama}</td>
                                                        <td className="p-5 font-bold text-slate-400">{s.kelas}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modal Manual Input */}
                    {isManualModalOpen && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-sm p-10 rounded-[3rem] shadow-2xl relative animate-in zoom-in duration-200">
                                <button onClick={() => setIsManualModalOpen(false)} className="absolute top-8 right-8 text-slate-300 hover:text-slate-500 transition-colors font-bold">✕</button>
                                <h3 className="text-lg font-extrabold text-slate-800 mb-6 uppercase tracking-tight">Input Manual ID</h3>
                                <input 
                                    id="manualInput" 
                                    placeholder="Masukkan ID Barcode..." 
                                    className="w-full p-6 bg-slate-50 rounded-3xl text-sm font-bold outline-none mb-4 border border-transparent focus:border-indigo-100 transition-all" 
                                    autoFocus 
                                    onKeyDown={(e) => e.key === 'Enter' && (handleScanSuccess(e.target.value), setIsManualModalOpen(false))}
                                />
                                <button onClick={() => {
                                    handleScanSuccess(document.getElementById('manualInput').value);
                                    setIsManualModalOpen(false);
                                }} className="w-full bg-indigo-600 text-white py-6 rounded-3xl font-extrabold text-[10px] uppercase shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-colors">Proses Absensi</button>
                            </div>
                        </div>
                    )}

                    {/* Modal Login Admin */}
                    {isAdminLoginModalOpen && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-sm p-10 rounded-[3rem] shadow-2xl relative animate-in zoom-in duration-200">
                                <button onClick={() => setIsAdminLoginModalOpen(false)} className="absolute top-8 right-8 text-slate-300 hover:text-slate-500 transition-colors font-bold">✕</button>
                                <h3 className="text-lg font-extrabold text-slate-800 mb-6 uppercase tracking-tight">Login Administrator</h3>
                                <form onSubmit={handleAdminLogin}>
                                    <input 
                                        name="password" 
                                        type="password" 
                                        placeholder="Masukkan Password Admin" 
                                        className="w-full p-6 bg-slate-50 rounded-3xl text-sm font-bold outline-none mb-4 border border-transparent focus:border-slate-200 transition-all" 
                                        autoFocus 
                                    />
                                    <button type="submit" className="w-full bg-slate-900 text-white py-6 rounded-3xl font-extrabold text-[10px] uppercase shadow-xl hover:bg-slate-800 transition-colors">Masuk Panel Admin</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
